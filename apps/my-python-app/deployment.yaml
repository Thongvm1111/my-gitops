apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-python-app
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-python-app
  template:
    metadata:
      labels:
        app: my-python-app
    spec:
      containers:
        - name: my-python-app
          image: ghcr.io/thongvm1111/my-python-app:c559cae
          ports:
            - containerPort: 80
